name: Build Flutter APK (zip path OR url)

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "ID job dari Telegram"
        required: true
      zip_path:
        description: "Path zip di repo"
        required: false
        default: ""
      zip_url:
        description: "Direct URL zip (Catbox/dll)"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # =========================
      # DOWNLOAD + EXTRACT
      # =========================
      - name: Prepare workspace
        run: |
          set -e
          mkdir -p work
          cd work

          echo "=== DOWNLOAD SOURCE ==="

          if [ -n "${{ inputs.zip_url }}" ]; then
            echo "MODE: zip_url"

            # coba curl dulu
            if ! curl -L --fail --retry 3 --retry-delay 2 "${{ inputs.zip_url }}" -o project.zip; then
              echo "Curl gagal, coba wget..."
              wget -O project.zip --tries=3 "${{ inputs.zip_url }}"
            fi

          elif [ -n "${{ inputs.zip_path }}" ]; then
            echo "MODE: zip_path"
            cp "../${{ inputs.zip_path }}" project.zip
          else
            echo "ERROR: zip_url atau zip_path wajib diisi."
            exit 1
          fi

          echo "=== EXTRACT ZIP ==="
          unzip -q project.zip -d project || {
            echo "Unzip gagal, coba paksa..."
            unzip project.zip -d project
          }

      # =========================
      # AUTO DETECT FOLDER FLUTTER
      # =========================
      - name: Detect Flutter project
        run: |
          cd work/project

          if [ -f "pubspec.yaml" ]; then
            echo "ROOT PROJECT OK"
          else
            echo "Cari subfolder Flutter..."

            DIR=$(find . -maxdepth 2 -name pubspec.yaml | head -n 1)

            if [ -z "$DIR" ]; then
              echo "❌ Tidak ditemukan pubspec.yaml"
              exit 1
            fi

            DIR=$(dirname "$DIR")
            echo "Project ditemukan di $DIR"
            cd "$DIR"
            echo "PROJECT_DIR=$DIR" >> $GITHUB_ENV
          fi

      # =========================
      # PUB GET
      # =========================
      - name: Flutter pub get
        run: |
          cd work/project/${PROJECT_DIR:-}
          flutter pub get

      # =========================
      # BUILD APK
      # =========================
      - name: Build APK (release)
        run: |
          cd work/project/${PROJECT_DIR:-}
          flutter build apk --release

      # =========================
      # COLLECT OUTPUT
      # =========================
      - name: Collect outputs
        run: |
          mkdir -p out
          cp work/project/${PROJECT_DIR:-}/build/app/outputs/flutter-apk/*.apk "out/app-${{ inputs.job_id }}.apk"

      # =========================
      # UPLOAD
      # =========================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: out/*.apk
