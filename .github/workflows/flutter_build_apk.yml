name: Build Flutter APK (zip path OR url)

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "ID job dari Telegram"
        required: true
      zip_path:
        description: "Path zip di repo (mis: uploads/xxx.zip). Kosongkan jika pakai zip_url"
        required: false
        default: ""
      zip_url:
        description: "Direct URL zip (Catbox/dll). Kosongkan jika pakai zip_path"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =======================
      # CHECKOUT
      # =======================
      - name: Checkout repo
        uses: actions/checkout@v4

      # =======================
      # JAVA SETUP
      # =======================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # =======================
      # FLUTTER SETUP
      # =======================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # =======================
      # DOWNLOAD ZIP (URL / REPO)
      # =======================
      - name: Prepare workspace
        run: |
          set -e

          mkdir -p work
          cd work

          echo "=========================="
          echo "JOB ID: ${{ inputs.job_id }}"
          echo "=========================="

          if [ -n "${{ inputs.zip_url }}" ]; then
            echo "MODE: zip_url"
            echo "Downloading from URL..."

            curl -L --fail --retry 3 --retry-delay 2 \
              "${{ inputs.zip_url }}" \
              -o project.zip

          elif [ -n "${{ inputs.zip_path }}" ]; then
            echo "MODE: zip_path"
            echo "Copy from repo..."

            cp "../${{ inputs.zip_path }}" project.zip

          else
            echo "ERROR: zip_url atau zip_path wajib diisi."
            exit 1
          fi

          echo "Extracting ZIP..."
          unzip -q project.zip -d project || {
            echo "❌ Unzip gagal"
            exit 1
          }

      # =======================
      # PUB GET
      # =======================
      - name: Flutter pub get
        working-directory: work/project
        run: |
          flutter pub get

      # =======================
      # BUILD APK
      # =======================
      - name: Build APK (release)
        working-directory: work/project
        run: |
          flutter build apk --release

      # =======================
      # COLLECT APK
      # =======================
      - name: Collect outputs
        run: |
          mkdir -p out

          cp work/project/build/app/outputs/flutter-apk/app-release.apk \
            out/app-release-${{ inputs.job_id }}.apk

      # =======================
      # UPLOAD ARTIFACT
      # =======================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ inputs.job_id }}
          path: out/*.apk
